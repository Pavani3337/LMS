<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLMS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
  <h2>CLMS Login</h2>

  <input type="text" id="adminId" placeholder="Admin ID">
  <input type="password" id="adminPass" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
  <h2>CLMS Dashboard</h2>
  <button onclick="logout()">Logout</button>
</header>

<nav>
  <button onclick="showTab('students')">Students</button>
  <button onclick="showTab('books')">Books</button>
  <button onclick="showTab('issue')">Issue</button>
</nav>

<!-- STUDENTS -->
<section id="students" class="tab">
  <h3>Students</h3>

  <input id="sName" placeholder="Full Name">
  <input id="sRoll" placeholder="Roll Number">
  <button onclick="addStudent()">Add Student</button>

  <input id="searchStudent" placeholder="Search Roll" onkeyup="renderStudents()">

  <div id="studentList"></div>
</section>

<!-- BOOKS -->
<section id="books" class="tab hidden">
  <h3>Books</h3>

  <input id="bName" placeholder="Book Name">
  <input id="bAuthor" placeholder="Author">
  <button onclick="addBook()">Add Book</button>

  <div id="bookList"></div>
</section>

<!-- ISSUE -->
<section id="issue" class="tab hidden">
  <h3>Issue Book</h3>

  <select id="selectStudent"></select>
  <select id="selectBook"></select>
  <input type="date" id="issueDate">

  <button onclick="issueBook()">Issue</button>

  <div id="issueList"></div>
</section>

</div>

<script src="script.js" defer></script>

</body>
</html>
